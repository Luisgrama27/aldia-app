<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Al Día</title>
    <meta name="description" content="Controla los vencimientos de tus productos del hogar" />
    <meta name="theme-color" content="#2DB54E" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Al Día" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 100%; height: 100%;
        background: #2DB54E;
        overflow: hidden;
      }
      #root { width: 100%; height: 100%; }

      /* Splash nativo en HTML — aparece ANTES de que React cargue */
      #native-splash {
        position: fixed;
        inset: 0;
        background: #2DB54E;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        gap: 20px;
        transition: opacity 0.4s ease;
      }
      #native-splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #native-splash svg {
        filter: drop-shadow(0 4px 16px rgba(0,0,0,0.2));
        animation: splashPop 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
      }
      #native-splash .title {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 38px;
        font-weight: 700;
        color: #fff;
        letter-spacing: -1px;
        opacity: 0;
        transform: translateY(16px);
        animation: splashFade 0.5s ease 0.5s forwards;
      }
      #native-splash .sub {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 15px;
        color: rgba(255,255,255,0.8);
        margin-top: -12px;
        opacity: 0;
        animation: splashFade 0.5s ease 0.7s forwards;
      }
      #native-splash .dots {
        position: absolute;
        bottom: 50px;
        display: flex;
        gap: 8px;
        opacity: 0;
        animation: splashFade 0.5s ease 1.1s forwards;
      }
      #native-splash .dot {
        height: 8px; border-radius: 999px;
        background: rgba(255,255,255,0.4);
      }
      #native-splash .dot.active {
        width: 24px; background: #fff;
      }
      #native-splash .dot:not(.active) { width: 8px; }
      @keyframes splashPop {
        from { transform: scale(0.2); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }
      @keyframes splashFade {
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <!-- Splash nativo que aparece ANTES de React -->
    <div id="native-splash">
      <svg width="100" height="100" viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="36" fill="#fff" stroke="#fff" stroke-width="1.5"/>
        <path d="M40 20 C40 20 52 28 52 38 C52 48 46 54 40 56 C34 54 28 48 28 38 C28 28 40 20 40 20Z" fill="none" stroke="#2DB54E" stroke-width="2.5" stroke-linecap="round"/>
        <polyline points="33,38 38,43 47,32" fill="none" stroke="#2DB54E" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M25 50 Q40 45 55 50" stroke="#2DB54E" stroke-width="1.5" fill="none" opacity="0.6"/>
      </svg>
      <div class="title">Al Día</div>
      <div class="sub">Controla lo que tienes en casa</div>
      <div class="dots">
        <div class="dot"></div>
        <div class="dot active"></div>
        <div class="dot"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      document.addEventListener('gesturestart', e => e.preventDefault());
      document.addEventListener('gesturechange', e => e.preventDefault());
      document.addEventListener('gestureend', e => e.preventDefault());

      // Ocultar splash nativo cuando React esté listo
      window.__hideSplash = function() {
        const s = document.getElementById('native-splash');
        if (s) {
          s.classList.add('hidden');
          setTimeout(() => s.remove(), 400);
        }
      };

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(e => console.log('SW error:', e));
        });
      }
    </script>
  </body>
</html>
